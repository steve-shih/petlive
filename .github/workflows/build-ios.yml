name: Build iOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Next.js Static Export
        working-directory: ./frontend
        run: npm run build

      - name: Add iOS platform (if missing)
        working-directory: ./frontend
        run: |
          npm install @capacitor/ios
          npx cap add ios || echo "iOS already added"

      - name: Sync Capacitor to iOS
        working-directory: ./frontend
        run: npx cap sync ios

      - name: Build iOS App (Simulator/Unsigned)
        working-directory: ./frontend/ios/App
        run: |
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Compress iOS App
        working-directory: ./frontend/ios/App/DerivedData/App/Build/Products/Debug-iphonesimulator
        run: zip -r petlive-ios-simulator.zip App.app || echo "Build output path may vary"

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: petlive-ios-simulator.zip
          path: frontend/ios/App/DerivedData/App/Build/Products/Debug-iphonesimulator/petlive-ios-simulator.zip
          if-no-files-found: ignore
